name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.9", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install pytest
      - run: python -m pytest tests/ -q
      - name: Engine imports clean on a bare interpreter (stdlib-only claim)
        run: python -c "import sys; sys.path.insert(0, 'engine'); import lib, adapters, extractor, review"
